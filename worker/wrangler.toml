name = "voltline-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Created via `wrangler kv namespace create VOLTLINE_KV` — paste the returned id below.
kv_namespaces = [
  { binding = "VOLTLINE_KV", id = "REPLACE_WITH_KV_NAMESPACE_ID" }
]

# Secrets (never put these here — set via `wrangler secret put <NAME>`):
#   ODDS_API_KEY   — key from https://the-odds-api.com
#   ADMIN_PASSWORD — password required to open /admin
